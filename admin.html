<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Rotaract Versova</title>
    <link rel="stylesheet" href="css/style.css?v=4">
    <style>
        body { padding: 40px 20px; text-align: center; }
        .admin-container { max-width: 800px; margin: 0 auto; text-align: left; }
        #dashboard { display: none; }
        .data-card { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; }
        .data-card h4 { color: var(--cranberry); margin-bottom: 8px; }
        .data-card span { color: var(--text-dim); font-size: 0.85rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .tab-btns { display: flex; gap: 8px; margin: 24px 0; }
        .tab-btn { padding: 8px 20px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .tab-btn.active { background: var(--white); border-color: var(--white); color: var(--bg); }
        .count-badge { display: inline-block; background: var(--cranberry); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 100px; margin-left: 8px; }
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); }
        .loading { text-align: center; padding: 48px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="admin-container" id="loginView">
    <h2 style="margin-bottom: 8px;">Admin Access</h2>
    <p style="margin-bottom: 24px; color: var(--text-dim); font-size: 0.9rem;">Enter the admin password to view submitted messages.</p>
    <div class="form-group">
        <label for="adminPassword" style="display:block; font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.6); margin-bottom:7px;">Password</label>
        <input type="password" id="adminPassword" style="width:100%; padding:12px 16px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:white; font-family:'Inter',sans-serif; font-size:0.9rem; outline:none;" placeholder="Enter password..." onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-white" onclick="login()">Access Dashboard</button>
    <p id="loginError" style="color: #ef4444; margin-top: 12px; display: none; font-size: 0.88rem;">Invalid password. Try again.</p>
</div>

<div class="admin-container" id="dashboard">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
        <h2>Admin Dashboard</h2>
        <button class="btn btn-outline" style="padding: 8px 18px; font-size: 0.8rem;" onclick="logout()">Logout</button>
    </div>

    <div class="tab-btns">
        <button class="tab-btn active" onclick="switchTab('contacts', this)">Contact Messages <span class="count-badge" id="contactCount">0</span></button>
        <button class="tab-btn" onclick="switchTab('volunteers', this)">Volunteer Apps <span class="count-badge" id="volunteerCount">0</span></button>
    </div>
    
    <div id="contactTab"></div>
    <div id="volunteerTab" style="display:none;"></div>
</div>

<script>
    let token = localStorage.getItem('adminToken');
    if (token) showDashboard();

    async function login() {
        const password = document.getElementById('adminPassword').value;
        try {
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                token = data.token;
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('loginError').textContent = 'Connection error. Is the server running?';
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem('adminToken');
        token = null;
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('contactTab').style.display = tab === 'contacts' ? 'block' : 'none';
        document.getElementById('volunteerTab').style.display = tab === 'volunteers' ? 'block' : 'none';
    }

    async function showDashboard() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('contactTab').innerHTML = '<div class="loading">Loading messages...</div>';
        
        try {
            const res = await fetch('/api/admin-data', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) return logout();

            const data = await res.json();
            
            document.getElementById('contactCount').textContent = data.contacts.length;
            document.getElementById('volunteerCount').textContent = data.volunteers.length;
            
            const contactHtml = data.contacts.reverse().map(c => `
                <div class="data-card">
                    <h4>${esc(c.name)}</h4>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">${esc(c.email)}</p>
                    ${c.subject ? `<p style="margin-bottom:8px;"><strong style="color:var(--white);">Subject:</strong> ${esc(c.subject)}</p>` : ''}
                    <p style="color:var(--text); line-height:1.6;">${esc(c.message)}</p>
                    <span style="display:block; margin-top:12px;">${new Date(c.date).toLocaleString()}</span>
                </div>
            `).join('') || '<div class="empty-state">No contact messages yet.</div>';
            document.getElementById('contactTab').innerHTML = contactHtml;

            const volHtml = data.volunteers.reverse().map(v => `
                <div class="data-card">
                    <h4>${esc(v.name)}</h4>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:8px;">${esc(v.email)} | ${esc(v.phone)}</p>
                    <p><strong style="color:var(--white);">Age:</strong> ${esc(v.age)} | <strong style="color:var(--white);">Area:</strong> ${esc(v.area || 'N/A')}</p>
                    <p><strong style="color:var(--white);">Profession:</strong> ${esc(v.profession || 'N/A')}</p>
                    ${v.why_join ? `<p style="margin-top:8px;"><strong style="color:var(--white);">Why Join:</strong> ${esc(v.why_join)}</p>` : ''}
                    <span style="display:block; margin-top:12px;">${new Date(v.date).toLocaleString()}</span>
                </div>
            `).join('') || '<div class="empty-state">No volunteer applications yet.</div>';
            document.getElementById('volunteerTab').innerHTML = volHtml;
        } catch (e) {
            document.getElementById('contactTab').innerHTML = '<div class="empty-state">Error loading data. Make sure KV store is connected.</div>';
        }
    }

    function esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = String(str);
        return d.innerHTML;
    }
</script>

</body>
</html>
